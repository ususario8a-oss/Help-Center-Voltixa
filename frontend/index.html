<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Help Center - Panel Administrativo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Help Center Voltixa⚡</h1>

    <!-- LOGIN -->
<div id="loginSection" class="card">

    <h2>Iniciar sesión</h2>

    <form id="loginForm">

        <input type="email"
               id="email"
               placeholder="Correo"
               required>

        <input type="password"
               id="password"
               placeholder="Contraseña"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <!-- REGISTRO -->
    <div class="register-container">

        <h2>Registro de Usuario</h2>

        <input
            type="email"
            id="registerEmail"
            placeholder="Correo electrónico"
        >

        <input
            type="password"
            id="registerPassword"
            placeholder="Contraseña"
        >

        <button onclick="register()">
            Registrarse
        </button>

    </div>

</div>
    <!-- APP USUARIO -->
    <div id="appSection" style="display:none;">
        <div class="card">
            <h2>Lista de Tickets 📝</h2>

            <div class="buttons">
                <button onclick="obtenerTickets()">🔄 Cargar</button>
                <button onclick="logout()" class="danger">🚪 Cerrar sesión</button>
            </div>

            <ul id="listaTickets"></ul>
        </div>

        <div class="card">
            <h2>Crear Ticket 🧾</h2>

            <form id="formTicket">
                <input type="text" id="titulo" placeholder="Título" required>
                <textarea id="descripcion" placeholder="Descripción" required></textarea>

               

                <button type="submit">Crear Ticket</button>
            </form>
        </div>
    </div>

    <!-- PANEL ADMIN (oculto al inicio) -->
    <div id="adminPanel" style="display:none;">
        <h1>Panel Administrativo</h1>

        <div class="menu">
            <button onclick="cargarTickets()">Tickets</button>
            <button onclick="cargarUsuarios()">Usuarios</button>
        </div>

        <div id="contenido">
            <p>Bienvenido al sistema Help Center</p>
        </div>
    </div>

    <p id="mensaje" class="mensaje"></p>

    <script src="app.js"></script>
    
</body>
</html>
